<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance - EduDash</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <h1>📚 EduDash</h1>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">🏠 Dashboard</a>
                <a href="students.html" class="nav-link">👥 Students</a>
                <a href="courses.html" class="nav-link">📖 Courses</a>
                <a href="attendance.html" class="nav-link active">✓ Attendance</a>
                <a href="grades.html" class="nav-link">📊 Grades</a>
                <a href="reports.html" class="nav-link">📈 Reports</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>Attendance Management</h2>
                <div class="user-info">Admin <img src="https://via.placeholder.com/40" alt="User"></div>
            </header>

            <section class="content">
                <div class="card">
                    <h3>Mark Attendance</h3>
                    <form id="attendanceForm" class="form-grid">
                        <input type="number" id="studentId" placeholder="Student ID" required>
                        <input type="number" id="courseId" placeholder="Course ID" required>
                        <input type="date" id="attendanceDate" required>
                        <select id="status" required>
                            <option value="">Select Status</option>
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                            <option value="Late">Late</option>
                        </select>
                        <button type="button" onclick="markAttendance()" class="btn btn-primary">Mark Attendance</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Attendance Records</h3>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student ID</th>
                                <th>Course ID</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceList">
                            <tr>
                                <td colspan="5">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/attendance.js"></script>
</body>

</html>
