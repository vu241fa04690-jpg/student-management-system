<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students - EduDash</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <h1>📚 EduDash</h1>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">🏠 Dashboard</a>
                <a href="students.html" class="nav-link active">👥 Students</a>
                <a href="courses.html" class="nav-link">📖 Courses</a>
                <a href="attendance.html" class="nav-link">✓ Attendance</a>
                <a href="grades.html" class="nav-link">📊 Grades</a>
                <a href="reports.html" class="nav-link">📈 Reports</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>Students Management</h2>
                <div class="user-info">Admin <img src="https://via.placeholder.com/40" alt="User"></div>
            </header>

            <section class="content">
                <div class="card">
                    <h3>Add New Student</h3>
                    <form id="studentForm" class="form-grid">
                        <input type="text" id="name" placeholder="Full Name" required>
                        <input type="email" id="email" placeholder="Email" required>
                        <input type="text" id="phone" placeholder="Phone" required>
                        <input type="text" id="department" placeholder="Department" required>
                        <input type="number" id="year" placeholder="Year" required>
                        <button type="button" onclick="addStudent()" class="btn btn-primary">Add Student</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Students List</h3>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search by name, email, or department" onkeyup="searchStudents()">
                    </div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Year</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentList">
                            <tr>
                                <td colspan="6">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/students.js"></script>
</body>

</html>
